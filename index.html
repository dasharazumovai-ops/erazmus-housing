<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erasmus Life Nicosia Housing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
  <div class="hero-content">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Erasmus Life Nicosia Housing</h1>
    <p>Browse our verified apartments by area</p>

    <div class="hero-buttons">
      <a href="area.html?area=centre" class="hero-btn">City Centre</a>
      <a href="area.html?area=engomi" class="hero-btn">Engomi</a>
      <a href="area.html?area=aglantzia" class="hero-btn">Aglantzia</a>
    </div>
  </div>
</header>

  <main>
    <section class="areas-section">
      <h2>Choose an area</h2>
      <div class="areas">

        <a href="area.html?area=centre" class="area-card">
          <h3>City Centre</h3>
          <p>Mainly flats in downtown Nicosia</p>
          <span>View apartments →</span>
        </a>

        <a href="area.html?area=engomi" class="area-card">
          <h3>Engomi</h3>
          <p>Close to UNIC and EUC</p>
          <span>View apartments →</span>
        </a>

        <a href="area.html?area=aglantzia" class="area-card">
          <h3>Aglantzia</h3>
          <p>Close to UCY</p>
          <span>View apartments →</span>
        </a>

      </div>
    </section>
  </main>

</body>
</html>
